name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: terroir-ma

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ──────────────────────────────────────────────
  # Job 2: Type check
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npm run typecheck

  # ──────────────────────────────────────────────
  # Job 3: Unit tests (fails if coverage < 80%)
  # ──────────────────────────────────────────────
  unit-test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov -- --testPathPattern=test/unit
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 4: Build Docker image
  # ──────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download font assets (required for PDF in Docker image)
        run: npm run fonts:download

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/terroir-ma-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/terroir-ma-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 5: Integration tests (Testcontainers)
  # ──────────────────────────────────────────────
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [unit-test]

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: terroir
          POSTGRES_PASSWORD: terroir_pass
          POSTGRES_DB: terroir_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U terroir -d terroir_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redpanda:
        image: redpandadata/redpanda:v24.1.1
        ports:
          - 19092:19092
        options: >-
          --health-cmd="rpk cluster health"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migration:run
        env:
          DATABASE_URL: postgresql://terroir:terroir_pass@localhost:5432/terroir_db
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: terroir
          DATABASE_PASSWORD: terroir_pass
          DATABASE_NAME: terroir_db

      - name: Check for schema drift (entities vs migrations)
        run: npm run migration:check
        env:
          DATABASE_URL: postgresql://terroir:terroir_pass@localhost:5432/terroir_db
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: terroir
          DATABASE_PASSWORD: terroir_pass
          DATABASE_NAME: terroir_db

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://terroir:terroir_pass@localhost:5432/terroir_db
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: terroir
          DATABASE_PASSWORD: terroir_pass
          DATABASE_NAME: terroir_db
          REDIS_URL: redis://localhost:6379
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          KAFKA_BROKERS: localhost:19092
          KAFKA_CLIENT_ID: terroir-ma-test
          QR_HMAC_SECRET: test-secret-key-minimum-32-characters-long
          QR_VERIFICATION_BASE_URL: http://localhost:3000/api/v1/verify

  # ──────────────────────────────────────────────
  # Job 6: Security — Trivy vulnerability scan
  # ──────────────────────────────────────────────
  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/terroir-ma-image.tar

      - name: Run Trivy vulnerability scan (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Run Trivy filesystem scan (repo)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
