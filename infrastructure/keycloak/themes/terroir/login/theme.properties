# =============================================================================
# Terroir.ma — Keycloak Login Theme
# Extends the base Keycloak theme with Morocco-inspired branding.
# Colors derived from the Moroccan flag (green #006233, red #C1272D)
# and traditional terracotta/earth tones.
# =============================================================================

parent=keycloak
import=common/keycloak

# ── Stylesheets ───────────────────────────────────────────────────────────────
# terroir.css overrides variables; login.css adds layout adjustments
styles=css/login.css css/terroir.css

# ── Supported Locales ─────────────────────────────────────────────────────────
# Arabic (RTL, default), French, Amazigh/Tamazight (Tifinagh script)
locales=ar,fr,zgh

# ── Custom Images ─────────────────────────────────────────────────────────────
kcLogoUrl=../img/terroir-logo.png
kcFaviconUrl=../img/favicon.ico

# ── Theme HTML Classes ────────────────────────────────────────────────────────
kcHtmlClass=terroir-theme
kcBodyClass=terroir-login
kcFormCardClass=terroir-card
kcButtonPrimaryClass=btn btn-primary terroir-btn-primary

# ── Morocco-Inspired Color Palette ────────────────────────────────────────────
# Primary: Moroccan flag green
primaryColor=#006233
# Secondary: Moroccan flag red
secondaryColor=#C1272D
# Background: warm parchment / earth tone
backgroundColor=#F5EFE6
# Text: dark espresso brown
textColor=#2C1810
# Link color
linkColor=#006233
# Link hover
linkHoverColor=#004d28
# Card background
cardBackground=#FFFFFF
# Border color
borderColor=#D4B896
# Input focus border
focusBorderColor=#006233
# Error color
errorColor=#C1272D
# Success color
successColor=#006233

# ── Typography ────────────────────────────────────────────────────────────────
# Supports Arabic, French, and Latin scripts
fontFamily=Noto Sans Arabic, Noto Sans, system-ui, -apple-system, sans-serif
fontFamilyAr=Noto Sans Arabic, Amiri, serif

# ── Layout ────────────────────────────────────────────────────────────────────
# Login box max-width
loginBoxMaxWidth=500px

# ── i18n overrides ────────────────────────────────────────────────────────────
# These are picked up by Keycloak's message bundle system
# Full translations live in messages/messages_ar.properties etc.
